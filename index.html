<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leche Barista</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leche Barista">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a2332;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .header { text-align: center; margin-bottom: 2rem; }
  .header .icon { font-size: 36px; margin-bottom: 8px; }
  .header h1 { font-size: 1.4rem; font-weight: 700; color: #1a2332; }
  .header p { font-size: 0.85rem; color: #6b7a8d; margin-top: 4px; }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b7a8d;
    margin-bottom: 10px;
  }

  .section { margin-bottom: 1.5rem; }

  .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }

  .pill {
    flex: 1;
    min-width: 80px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    font-size: 0.9rem;
    font-weight: 600;
    color: #64748b;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    white-space: nowrap;
  }
  .pill:hover { border-color: #94a3b8; color: #334155; }
  .pill.active {
    background: #0ea5e9;
    border-color: #0ea5e9;
    color: #fff;
    box-shadow: 0 2px 8px rgba(14,165,233,0.3);
  }

  .pill-custom {
    flex: 1.4;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
  }
  .pill-custom input {
    width: 70px;
    border: none;
    background: transparent;
    font-size: 0.9rem;
    font-weight: 600;
    color: inherit;
    outline: none;
    text-align: center;
  }
  .pill-custom input::placeholder { color: rgba(100,116,139,0.6); }
  .pill-custom.active input { color: #fff; }
  .pill-custom.active input::placeholder { color: rgba(255,255,255,0.6); }
  .pill-custom span { font-size: 0.78rem; opacity: 0.75; }

  .milk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .milk-box {
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .milk-box:focus-within { border-color: #94a3b8; }

  .milk-box .milk-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #94a3b8;
    margin-bottom: 8px;
  }
  .milk-input-wrap { display: flex; align-items: center; gap: 4px; }
  .milk-input-wrap input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a2332;
    outline: none;
  }
  .milk-input-wrap .pct { font-size: 1rem; font-weight: 600; color: #94a3b8; }
  .milk-box small { font-size: 0.72rem; color: #94a3b8; display: block; margin-top: 4px; }

  .divider { border: none; border-top: 1.5px solid #f0f4f8; margin: 0.5rem 0 1.5rem; }

  .result-box {
    background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
    border-radius: 16px;
    padding: 1.5rem;
    color: #fff;
    margin-bottom: 1.25rem;
  }
  .result-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.75; margin-bottom: 1rem; }

  .result-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .result-item { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 12px; }
  .result-item .ri-label { font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; }
  .result-item .ri-value { font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .result-item .ri-pct { font-size: 0.75rem; opacity: 0.75; margin-top: 3px; }

  .bar-wrap { margin-top: 1rem; }
  .bar-track { height: 10px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,0.2); display: flex; }
  .bar-a { background: #fff; transition: width 0.4s cubic-bezier(.4,0,.2,1); height: 100%; border-radius: 999px; }
  .bar-b { background: rgba(255,255,255,0.4); flex: 1; height: 100%; }
  .bar-labels { display: flex; justify-content: space-between; font-size: 0.72rem; opacity: 0.8; margin-top: 5px; }

  .verify-box {
    background: #f0fdf4;
    border: 1.5px solid #bbf7d0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.8rem;
    color: #166534;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .verify-box .check { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

  .error-box {
    background: #fff1f2;
    border: 1.5px solid #fecdd3;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 0.82rem;
    color: #9f1239;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Banner de instalación */
  #installBanner {
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    color: #fff;
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 0.82rem;
  }
  #installBanner span { flex: 1; }
  #installBanner button {
    background: #fff;
    color: #0284c7;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
  }
  #installBanner .close-btn {
    background: transparent;
    color: rgba(255,255,255,0.7);
    padding: 4px 6px;
    font-size: 1rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">🥛</div>
    <h1>Leche Barista</h1>
    <p>Calculá las proporciones exactas para el tenor graso deseado</p>
  </div>

  <!-- Banner instalar como app -->
  <div id="installBanner" class="hidden">
    <span>📲 Instalá como app para acceso rápido</span>
    <button id="installBtn">Instalar</button>
    <button class="close-btn" onclick="document.getElementById('installBanner').classList.add('hidden')">✕</button>
  </div>

  <!-- Cantidad -->
  <div class="section">
    <p class="section-label">Cantidad a obtener</p>
    <div class="pill-group">
      <button class="pill active" id="btn125" onclick="selectQty(125, this)">125 g</button>
      <button class="pill" id="btn245" onclick="selectQty(245, this)">245 g</button>
      <button class="pill" id="btn260" onclick="selectQty(260, this)">260 g</button>
      <button class="pill pill-custom" id="btnCustom" onclick="activateCustom(this)">
        <input type="number" id="customQty" placeholder="otro" min="1" step="1"
               onfocus="activateCustom(document.getElementById('btnCustom'))"
               oninput="onCustomInput()" />
        <span>g</span>
      </button>
    </div>
  </div>

  <!-- Tenor graso objetivo -->
  <div class="section">
    <p class="section-label">Tenor graso objetivo</p>
    <div class="pill-group">
      <button class="pill active" id="btnF15" onclick="selectFat(1.5, this)">1,5%</button>
      <button class="pill" id="btnF17" onclick="selectFat(1.7, this)">1,7%</button>
    </div>
  </div>

  <hr class="divider">

  <!-- Leches disponibles -->
  <div class="section">
    <p class="section-label">Leches disponibles</p>
    <div class="milk-grid">
      <div class="milk-box">
        <div class="milk-name">Leche A</div>
        <div class="milk-input-wrap">
          <input type="number" id="f1" value="3.0" min="0.1" max="40" step="0.1" oninput="calc()">
          <span class="pct">%</span>
        </div>
        <small>% de grasa</small>
      </div>
      <div class="milk-box">
        <div class="milk-name">Leche B</div>
        <div class="milk-input-wrap">
          <input type="number" id="f2" value="1.0" min="0.1" max="40" step="0.1" oninput="calc()">
          <span class="pct">%</span>
        </div>
        <small>% de grasa</small>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div id="errorBox" class="error-box hidden">
    <span>⚠️</span>
    <span id="errorMsg"></span>
  </div>

  <!-- Resultado -->
  <div id="resultSection" class="hidden">
    <div class="result-box">
      <div class="result-title">Resultado</div>
      <div class="result-row">
        <div class="result-item">
          <div class="ri-label">Leche A (<span id="rF1">3.0</span>%)</div>
          <div class="ri-value" id="r1">—</div>
          <div class="ri-pct" id="rP1">—</div>
        </div>
        <div class="result-item">
          <div class="ri-label">Leche B (<span id="rF2">1.0</span>%)</div>
          <div class="ri-value" id="r2">—</div>
          <div class="ri-pct" id="rP2">—</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-a" id="barA"></div>
          <div class="bar-b"></div>
        </div>
        <div class="bar-labels">
          <span>Leche A</span>
          <span>Leche B</span>
        </div>
      </div>
    </div>
    <div class="verify-box">
      <span class="check">✓</span>
      <span id="verifyText"></span>
    </div>
  </div>
</div>

<script>
  // --- Service Worker ---
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('SW registrado'))
        .catch(err => console.log('SW error:', err));
    });
  }

  // --- Botón instalar (PWA install prompt) ---
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.remove('hidden');
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').classList.add('hidden');
    }
  });

  // --- Lógica de la calculadora ---
  let currentW = 125;
  let currentF = 1.5;

  function selectQty(val, btn) {
    currentW = val;
    document.querySelectorAll('.pill-group')[0].querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customQty').value = '';
    calc();
  }

  function activateCustom(btn) {
    document.querySelectorAll('.pill-group')[0].querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('customQty').focus();
  }

  function onCustomInput() {
    const v = parseFloat(document.getElementById('customQty').value);
    if (!isNaN(v) && v > 0) { currentW = v; calc(); }
  }

  function selectFat(val, btn) {
    currentF = val;
    document.querySelectorAll('.pill-group')[1].querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    calc();
  }

  function showError(msg) {
    document.getElementById('errorBox').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('resultSection').classList.add('hidden');
  }

  function hideError() {
    document.getElementById('errorBox').classList.add('hidden');
  }

  function calc() {
    const W = currentW;
    const F = currentF;
    const F1 = parseFloat(document.getElementById('f1').value);
    const F2 = parseFloat(document.getElementById('f2').value);

    if (isNaN(W) || W <= 0) { showError('Ingresá una cantidad válida.'); return; }
    if (isNaN(F1) || isNaN(F2)) { showError('Completá los tenores grasos de ambas leches.'); return; }
    if (F1 === F2) { showError('Las dos leches deben tener distinto tenor graso.'); return; }

    const hi = Math.max(F1, F2), lo = Math.min(F1, F2);
    if (F >= hi || F <= lo) {
      showError(`El objetivo (${F}%) debe estar entre ${lo}% y ${hi}%.`);
      return;
    }

    hideError();

    const W1 = W * (F - F2) / (F1 - F2);
    const W2 = W - W1;
    const P1 = W1 / W * 100;
    const P2 = W2 / W * 100;

    document.getElementById('r1').textContent = W1.toFixed(1) + ' g';
    document.getElementById('r2').textContent = W2.toFixed(1) + ' g';
    document.getElementById('rP1').textContent = P1.toFixed(1) + '% del total';
    document.getElementById('rP2').textContent = P2.toFixed(1) + '% del total';
    document.getElementById('rF1').textContent = F1;
    document.getElementById('rF2').textContent = F2;
    document.getElementById('barA').style.width = P1.toFixed(1) + '%';

    const fatGrams = (W1 * F1 / 100 + W2 * F2 / 100);
    const targetFatGrams = W * F / 100;
    document.getElementById('verifyText').textContent =
      `Verificación: ${W1.toFixed(1)} g × ${F1}% + ${W2.toFixed(1)} g × ${F2}% = ${fatGrams.toFixed(3)} g de grasa (objetivo: ${targetFatGrams.toFixed(3)} g)`;

    document.getElementById('resultSection').classList.remove('hidden');
  }

  calc();
</script>
</body>
</html>
